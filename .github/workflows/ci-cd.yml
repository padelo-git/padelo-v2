name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd backend
        pytest --cov=app --cov-report=xml --cov-report=term-missing -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella

  deploy:
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    if: github.ref == 'refs/heads/main'  # Only deploy on main branch
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to AWS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2
          docker-compose down --remove-orphans
          # Force remove any remaining containers
          docker rm -f $(docker ps -aq) 2>/dev/null || true
          # Docker cleanup - preserve data volumes and recent images
          docker image prune -a -f --filter "until=24h"
          docker container prune -f
          git pull origin main
          docker-compose up -d --build
          
    - name: Create admin user
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose exec -T backend python create_admin.py || echo "Admin user creation skipped (may already exist)"
          
    - name: Check admin user and test login
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose exec -T backend python -c "
          import asyncio
          from sqlalchemy import text
          from core.database import engine
          async def check_admin():
              async with engine.begin() as conn:
                  result = await conn.execute(text('SELECT id, email, is_active, role FROM users WHERE email = :email'), {'email': 'davidgctd@gmail.com'})
                  user = result.fetchone()
                  if user:
                      print(f'Admin exists: id={user[0]}, email={user[1]}, is_active={user[2]}, role={user[3]}')
                  else:
                      print('Admin user does not exist')
          asyncio.run(check_admin())
          " || echo "Could not check admin user"
          curl -s http://localhost:8000/auth/login -X POST -H "Content-Type: application/json" -d '{"email":"davidgctd@gmail.com","password":"Argentina2026"}' || echo "Admin login test failed"
          
          
    - name: Check backend logs
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose logs backend --tail 50
          
    - name: Run migration to add missing club columns
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose exec -T db psql -U padelo -d padelo_db -c "
            ALTER TABLE clubs 
            ADD COLUMN IF NOT EXISTS tax_id VARCHAR(50),
            ADD COLUMN IF NOT EXISTS tax_name VARCHAR(100);
          "
          docker-compose exec -T db psql -U padelo -d padelo_db -c "
            ALTER TABLE clubs 
            ADD COLUMN IF NOT EXISTS stripe_customer_id VARCHAR(100),
            ADD COLUMN IF NOT EXISTS subscription_status VARCHAR(50) DEFAULT 'trial',
            ADD COLUMN IF NOT EXISTS subscription_plan_id INTEGER,
            ADD COLUMN IF NOT EXISTS monthly_price NUMERIC(10, 2) DEFAULT 200.00;
          "
          docker-compose exec -T db psql -U padelo -d padelo_db -c "
            ALTER TABLE clubs 
            ADD COLUMN IF NOT EXISTS trial_start_date TIMESTAMP,
            ADD COLUMN IF NOT EXISTS trial_end_date TIMESTAMP,
            ADD COLUMN IF NOT EXISTS grace_period_end_date TIMESTAMP;
          "
          docker-compose exec -T db psql -U padelo -d padelo_db -c "
            ALTER TABLE clubs 
            ADD COLUMN IF NOT EXISTS currency VARCHAR(10) DEFAULT 'USD',
            ADD COLUMN IF NOT EXISTS timezone VARCHAR(100) DEFAULT 'America/Argentina/Buenos_Aires';
          "
          docker-compose exec -T db psql -U padelo -d padelo_db -c "
            ALTER TABLE clubs 
            ADD COLUMN IF NOT EXISTS price_per_hour NUMERIC(10, 2) DEFAULT 200.00,
            ADD COLUMN IF NOT EXISTS class_price_1_2_total NUMERIC(10, 2),
            ADD COLUMN IF NOT EXISTS class_price_3_per_student NUMERIC(10, 2),
            ADD COLUMN IF NOT EXISTS class_price_4_per_student NUMERIC(10, 2);
          "
          docker-compose exec -T db psql -U padelo -d padelo_db -c "
            ALTER TABLE clubs 
            ADD COLUMN IF NOT EXISTS day_start_min INTEGER DEFAULT 480,
            ADD COLUMN IF NOT EXISTS day_end_min INTEGER DEFAULT 1320;
          "
          echo "Migration completed successfully"
          
    - name: Test club creation endpoint
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "=== Testing club creation endpoint ==="
          curl -X POST http://localhost:8000/clubs/ -H "Content-Type: application/json" -d '{"name":"Test Club","slug":"test-club-$(date +%s)","email":"testclub@example.com","password":"Test123!","phone":"1234567890","address":"Test Address","city":"Test City","country":"Argentina","description":"Test description"}' -v
          echo ""
          echo "=== Backend logs after test ==="
          cd ~/padelo-v2/backend
          docker-compose logs backend --tail 20
          
    - name: Diagnose server state
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "=== Docker containers ==="
          docker ps
          echo "=== Docker compose status ==="
          cd ~/padelo-v2
          docker-compose ps
          echo "=== Backend port check ==="
          netstat -tlnp | grep 8000 || echo "Port 8000 not listening"
          echo "=== Frontend port check ==="
          netstat -tlnp | grep 80 || echo "Port 80 not listening"
          echo "=== Nginx status ==="
          sudo systemctl status nginx || echo "Nginx not running"
          echo "=== Test backend directly ==="
          curl -s http://localhost:8000/health || echo "Backend health check failed"
          echo "=== Test frontend directly ==="
          curl -s http://localhost:80/ || echo "Frontend health check failed"
          echo "=== Frontend logs ==="
          docker-compose logs frontend --tail 20
          
    - name: Stop nginx to allow direct access
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo systemctl stop nginx
          sudo systemctl disable nginx
          sudo pkill -9 nginx
          echo "Nginx stopped, disabled and killed"
          
    - name: Open port 8080 in firewall
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo ufw allow 3000/tcp
          sudo ufw allow 8000/tcp
          echo "Ports 3000 and 8000 opened in firewall"
          
    - name: Open port 3000 in AWS security group
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Get the security group ID of the instance
          INSTANCE_ID=$(ec2-metadata -i | cut -d " " -f 2)
          SG_ID=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' --output text)
          echo "Security Group ID: $SG_ID"

          # Add rule to allow port 3000
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 3000 --cidr 0.0.0.0/0 || echo "Rule may already exist"
          echo "Port 3000 opened in AWS security group"
          
    - name: Check Docker containers status
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "=== Docker Containers Status ==="
          docker ps -a
          echo ""
          echo "=== Frontend Container Logs ==="
          docker logs padelo-v2-frontend-1 --tail 50
          echo ""
          echo "=== Backend Container Logs ==="
          docker logs padelo-v2-backend-1 --tail 50
          echo ""
          echo "=== Network Status ==="
          docker network ls
          echo ""
          echo "=== Port Listening Status ==="
          sudo netstat -tlnp | grep -E ':(8080|8000)' || echo "No ports 8080 or 8000 listening"
          
    - name: Restart frontend if exited
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2
          docker-compose restart frontend
          echo "Frontend restarted"
          sleep 5
          docker ps
          
    - name: Verify frontend is accessible
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "=== Testing frontend accessibility ==="
          curl -I http://localhost:3000 || echo "Frontend not accessible on localhost:3000"
          curl -I http://localhost:80 || echo "Frontend not accessible on localhost:80"
          
    - name: Add SSH key for direct access
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "ssh-rsa  lucianalujaniriarte@MacBook-Air-de-Luciana-3.local" >> ~/.ssh/authorized_keys
          echo "SSH key added for direct access"
          
    - name: Notify deployment success
      if: success()
      run: echo "Deployment completed successfully!"
