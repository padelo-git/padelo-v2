name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd backend
        pytest --cov=app --cov-report=xml --cov-report=term-missing -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella

  deploy:
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    if: github.ref == 'refs/heads/main'  # Only deploy on main branch
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to AWS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2
          docker-compose down --remove-orphans
          # Docker cleanup - preserve data volumes
          docker system prune -a -f
          git pull origin main
          docker-compose up -d --build
          
    - name: Create admin user
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose exec -T backend python create_admin.py || echo "Admin user creation skipped (may already exist)"
          
    - name: Check admin user and test login
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose exec -T backend python -c "
          import asyncio
          from sqlalchemy import text
          from core.database import engine
          async def check_admin():
              async with engine.begin() as conn:
                  result = await conn.execute(text('SELECT id, email, is_active, role FROM users WHERE email = :email'), {'email': 'davidgctd@gmail.com'})
                  user = result.fetchone()
                  if user:
                      print(f'Admin exists: id={user[0]}, email={user[1]}, is_active={user[2]}, role={user[3]}')
                  else:
                      print('Admin user does not exist')
          asyncio.run(check_admin())
          " || echo "Could not check admin user"
          curl -s http://localhost:8000/auth/login -X POST -H "Content-Type: application/json" -d '{"email":"davidgctd@gmail.com","password":"Argentina2026"}' || echo "Admin login test failed"
          
          
    - name: Check backend logs
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose logs backend --tail 50
          
    - name: Diagnose server state
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "=== Docker containers ==="
          docker ps
          echo "=== Docker compose status ==="
          cd ~/padelo-v2
          docker-compose ps
          echo "=== Backend port check ==="
          netstat -tlnp | grep 8000 || echo "Port 8000 not listening"
          echo "=== Frontend port check ==="
          netstat -tlnp | grep 3000 || echo "Port 3000 not listening"
          echo "=== Nginx status ==="
          sudo systemctl status nginx || echo "Nginx not running"
          echo "=== Test backend directly ==="
          curl -s http://localhost:8000/health || echo "Backend health check failed"
          
    - name: Stop nginx to allow direct access
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo systemctl stop nginx
          sudo systemctl disable nginx
          sudo pkill -9 nginx
          echo "Nginx stopped, disabled and killed"
          
    - name: Notify deployment success
      if: success()
      run: echo "Deployment completed successfully!"
