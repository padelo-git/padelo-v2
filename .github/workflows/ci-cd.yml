name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd backend
        pytest --cov=app --cov-report=xml --cov-report=term-missing -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella

  deploy:
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass
    if: github.ref == 'refs/heads/main'  # Only deploy on main branch
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to AWS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2
          docker-compose down --remove-orphans
          docker network prune -f
          docker system prune -f
          git pull origin main
          docker-compose up -d --build
          
    - name: Create admin user
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose exec -T backend python create_admin.py
          
    - name: Configure nginx for Docker
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo cp ~/padelo-v2/frontend/nginx.conf /etc/nginx/sites-available/padelo
          sudo ln -sf /etc/nginx/sites-available/padelo /etc/nginx/sites-enabled/padelo
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo systemctl enable nginx
          sudo systemctl restart nginx
          
    - name: Check backend logs
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/padelo-v2/backend
          docker-compose logs backend --tail 50
          
    - name: Notify deployment success
      if: success()
      run: echo "Deployment completed successfully!"
