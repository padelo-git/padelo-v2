name: Deploy to Server

on:
  push:
    branches:
      - dist-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web version
        run: npx expo export:web
      
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: nexasist.com
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo rm -rf /var/www/padelo-pwa/*
            sudo cp -r /home/ec2-user/padelo-mobile/dist/* /var/www/padelo-pwa/
            sudo chown -R nginx:nginx /var/www/padelo-pwa/
            sudo chmod -R 755 /var/www/padelo-pwa/
            echo "Deployment successful"
